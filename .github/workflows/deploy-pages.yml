name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
    steps:
      - name: Check Cloudflare secrets
        id: cloudflare-secrets
        shell: bash
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" && -n "$CLOUDFLARE_PAGES_PROJECT_NAME" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets found. Deploy step is enabled."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are missing. Build/deploy steps will be skipped."
          fi

      - name: Checkout repository
        if: ${{ steps.cloudflare-secrets.outputs.ready == 'true' }}
        uses: actions/checkout@v4

      - name: Use Node.js 22
        if: ${{ steps.cloudflare-secrets.outputs.ready == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: ${{ steps.cloudflare-secrets.outputs.ready == 'true' }}
        working-directory: web
        run: npm ci

      - name: Build web app
        if: ${{ steps.cloudflare-secrets.outputs.ready == 'true' }}
        working-directory: web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: ${{ steps.cloudflare-secrets.outputs.ready == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
